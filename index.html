<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Incidencias</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Registro de Incidencias</h3>

</div>

<div class="card-body">

<div class="mb-3">

<label>Incidencia</label>

<input
id="incidencia"
class="form-control">

</div>

<div class="mb-3">

<label>Nodo</label>

<input
id="nodo"
class="form-control">

</div>

<div class="mb-3">

<label>OLT</label>

<input
id="olt"
class="form-control">

</div>

<div class="mb-3">

<label>Responsable</label>

<input
id="responsable"
class="form-control">

</div>

<div class="mb-3">

<label>Fecha</label>

<input
type="date"
id="fecha"
class="form-control">

</div>

<div class="mb-3">

<label>Hora</label>

<input
type="time"
id="hora"
class="form-control">

</div>

<button class="btn btn-success" onclick="guardar()">
    Guardar
</button>

</div>

</div>

</div>

<script src="js/app.js"></script>

</body>

</html>
